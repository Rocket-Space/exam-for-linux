name: Linux Multi-Artifact Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Linux Artifacts

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./SafeExamBrowser.Linux
        run: |
          npm install

      - name: Build .NET Core logic
        run: |
          dotnet build SafeExamBrowser.sln --configuration Release

      - name: Build Linux Artifacts (Deb, RPM, AppImage, Flatpak)
        working-directory: ./SafeExamBrowser.Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install flatpak builder if needed (usually in runners)
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          npm run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seb-linux-artifacts
          path: dist/
          if-no-files-found: error
