appId: "org.safeexambrowser.seb-linux"
productName: "Safe Exam Browser"
directories:
  output: ../dist/
files:
  - "!*"
  - "src/**/*"
  - "assets/**/*"
  - "!node_modules"

linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: AppImage
      arch: ["x64"]
    - target: deb
      arch: ["x64"]
    - target: rpm
      arch: ["x64"]
    - target: flatpak
      arch: ["x64"]

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libasound2
    - libgbm1

flatpak:
  runtimeVersion: "24.08"
  baseVersion: "24.08"
  finishArgs:
    - "--socket=wayland"
    - "--socket=x11"
    - "--share=ipc"
    - "--share=network"
    - "--talk-name=org.freedesktop.Notifications"
