<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Safe Exam Browser</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; }
        .browser-placeholder {
            width: 80vw;
            height: 60vh;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Safe Exam Browser for Linux</h1>
        <p>This is the initial Electron-based shell for SEB compatibility.</p>
        <div class="browser-placeholder">
            Exam Content View [Restricted]
        </div>
    </div>
</body>
</html>
